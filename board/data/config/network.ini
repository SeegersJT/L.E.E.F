; WiFi connection behavior
WIFI_CONNECT_MAX_RETRIES=40
WIFI_CONNECT_RETRY_DELAY=500
WIFI_RECONNECT_INTERVAL=5000

; Firebase / OTA
FIREBASE_PUSH_INTERVAL=60000
OTA_CHECK_INTERVAL=3600000

; Account pairing (unclaimed devices poll ownership status at this interval)
PAIRING_CHECK_INTERVAL=30000
OWNERSHIP_RECHECK_INTERVAL=1800000