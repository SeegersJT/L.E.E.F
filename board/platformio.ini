[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = marcoschwartz/LiquidCrystal_I2C@^1.1.4
build_flags = -std=c++17
build_unflags = -std=c++11

; 4MB flash board: default partitioning gives ~1.25MB per OTA app slot and
; ~1.4MB of SPIFFS we don't need (our .ini config files are a few hundred
; bytes total). min_spiffs.csv is bundled with the espressif32 platform and
; trades that unused SPIFFS space for larger OTA slots (~1.9MB each) -
; more headroom for firmware growth before OTA (two copies in flash at
; once) becomes tight. See README/roadmap notes on OTA.
board_build.partitions = min_spiffs.csv

extra_scripts =
    post:copy_firmware.py
    upload:copy_firmware.py